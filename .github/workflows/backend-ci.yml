name: backend-ci

# Monorepo hygiene: this git root also holds the audit engine, so only run when
# the backend (or this workflow) changes.
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "db/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "db/**"
      - ".github/workflows/backend-ci.yml"

defaults:
  run:
    working-directory: backend

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy app workers
      - name: Unit tests + coverage
        run: pytest -m "not integration" --cov=app --cov=workers --cov-report=term-missing

  integration:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    env:
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      # Supabase-needing integration tests (the route contract suite + the RLS
      # correctness matrix) auto-skip when these are empty, so CI stays green with
      # no secrets; wiring a DEDICATED TEST project's secrets here activates the
      # full live net (real-JWT contract + RLS role x table x op) in CI. Never
      # point these at production - the suites provision + delete users and rows.
      SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      # The redis-backed tests always run; the Supabase-backed suites run only
      # when the TEST_SUPABASE_* secrets are set (else they auto-skip).
      - name: Integration tests
        run: pytest -m integration

  security:
    # Dependency-vulnerability + secret scanning. Advisory hardening: dependency
    # vulns fail the job (triage a false positive with pip-audit --ignore-vuln);
    # gitleaks scans the full history for committed secrets.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the secret scan sees every commit
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: pip-audit (dependency vulnerabilities)
        run: |
          python -m pip install --upgrade pip setuptools
          python -m pip install -e ".[dev]" pip-audit
          python -m pip_audit --progress-spinner off
      - name: Secret scan (gitleaks)
        # Pinned CLI binary (no GITLEAKS_LICENSE needed, unlike the Action in orgs).
        run: |
          cd "$GITHUB_WORKSPACE"
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --config .gitleaks.toml --redact --no-banner

  db-rls:
    # Apply every migration to a throwaway Postgres and fail if any application
    # table lacks FORCE row-level security. This is the RLS coverage gate.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aios_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/aios_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Apply CI shim + migrations
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f ../db/ci/00_supabase_shim.sql
          for f in ../db/migrations/*.sql; do
            echo "applying $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: RLS gate (script)
        run: python -m app.db.rls_check
      - name: RLS gate (pytest)
        run: pytest -m integration tests/integration/test_rls_gate.py
