# On-Page SEO Master Checklist
# Source of truth for Team A (5 agents: A1 Content/EEAT, A2 Keyword/Semantic, A3 Headings/Meta, A4 Internal Links, A5 GEO/AI Search)
# 118 checks (local-specific items extracted to local.yaml; technical schema duplicates live in technical.yaml)
#
# Each entry schema:
#   id, name, subcategory, owner_agent, severity_default, data_sources, analyzer, automation
# Fields filled progressively in later phases:
#   evaluation_rubric, score_weight, reference, remediation_template

