name: backend-ci

# Monorepo hygiene: this git root also holds the audit engine, so only run when
# the backend (or this workflow) changes.
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "db/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "db/**"
      - ".github/workflows/backend-ci.yml"

defaults:
  run:
    working-directory: backend

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy app workers
      - name: Unit tests + coverage
        run: pytest -m "not integration" --cov=app --cov=workers --cov-report=term-missing

  integration:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aios_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      # Post-Supabase (P6A): the DB-backed integration suites - the RLS role x
      # table x op correctness matrix (+ the auto-discovering pg_policies oracle),
      # the real-token route-contract suite, portal isolation, repo/SQL parity and
      # the vault round-trip - run against an EPHEMERAL local Postgres with the
      # migrations applied. Both DSNs point at the throwaway superuser DB (the RLS
      # pool SETs ROLE authenticated per request; the admin pool is BYPASSRLS),
      # mirroring the local dev stack. The signing keypair + vault master key are
      # minted fresh below. Nothing here is a real secret - the DB is created and
      # dropped with the job; live-provider suites (Serper / Anthropic / Voyage /
      # Pinecone / audit-engine) still auto-skip since their keys are unset.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/aios_test
      DATABASE_ADMIN_URL: postgresql://postgres:postgres@localhost:5432/aios_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Apply migrations (0000 is the substrate; superuser owner = BYPASSRLS)
        run: |
          for f in ../db/migrations/*.sql; do
            echo "applying $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Mint an ephemeral EdDSA keypair + vault key (test-only, never a prod secret)
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PrivateKey
          from cryptography.hazmat.primitives import serialization as s
          k = Ed25519PrivateKey.generate()
          priv = k.private_bytes(s.Encoding.PEM, s.PrivateFormat.PKCS8, s.NoEncryption()).decode().strip()
          pub = k.public_key().public_bytes(s.Encoding.PEM, s.PublicFormat.SubjectPublicKeyInfo).decode().strip()
          print("JWT_PRIVATE_KEY<<PEM_EOF"); print(priv); print("PEM_EOF")
          print("JWT_PUBLIC_KEY<<PEM_EOF"); print(pub); print("PEM_EOF")
          PY
          echo "VAULT_MASTER_KEY=$(openssl rand -base64 32)" >> "$GITHUB_ENV"
      # The DB-, redis-, JWT- and vault-backed suites now all run in CI; the
      # live-provider suites still auto-skip (their keys are intentionally unset).
      - name: Integration tests
        run: pytest -m integration

  security:
    # Dependency-vulnerability + secret scanning. Advisory hardening: dependency
    # vulns fail the job (triage a false positive with pip-audit --ignore-vuln);
    # gitleaks scans the full history for committed secrets.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the secret scan sees every commit
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: pip-audit (dependency vulnerabilities)
        run: |
          python -m pip install --upgrade pip setuptools
          python -m pip install -e ".[dev]" pip-audit
          python -m pip_audit --progress-spinner off
      - name: Secret scan (gitleaks)
        # Pinned CLI binary (no GITLEAKS_LICENSE needed, unlike the Action in orgs).
        run: |
          cd "$GITHUB_WORKSPACE"
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --config .gitleaks.toml --redact --no-banner

  db-rls:
    # Apply every migration to a throwaway Postgres and fail if any application
    # table lacks FORCE row-level security. This is the RLS coverage gate.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aios_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/aios_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Apply migrations (no shim; 0000 is the substrate)
        # Applied as the postgres SUPERUSER (BYPASSRLS) so the SECURITY DEFINER RLS
        # helpers own-by-a-bypassrls-role and do not recurse. 0000_local_platform
        # creates the auth schema/uid() + the anon/authenticated/service_role roles
        # that every later migration references - no Supabase shim needed.
        run: |
          for f in ../db/migrations/*.sql; do
            echo "applying $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: RLS gate (script)
        run: python -m app.db.rls_check
      - name: RLS gate (pytest)
        run: pytest -m integration tests/integration/test_rls_gate.py
