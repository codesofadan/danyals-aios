name: backend-ci

# Monorepo hygiene: this git root also holds the audit engine, so only run when
# the backend (or this workflow) changes.
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "db/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "db/**"
      - ".github/workflows/backend-ci.yml"

defaults:
  run:
    working-directory: backend

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy app workers
      - name: Unit tests + coverage
        run: pytest -m "not integration" --cov=app --cov=workers --cov-report=term-missing

  integration:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    env:
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      # Supabase-needing integration tests auto-skip when SUPABASE_URL is unset,
      # so CI needs no secrets; the redis-backed ones run against the service above.
      - name: Integration tests
        run: pytest -m integration

  db-rls:
    # Apply every migration to a throwaway Postgres and fail if any application
    # table lacks FORCE row-level security. This is the RLS coverage gate.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aios_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/aios_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Apply CI shim + migrations
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f ../db/ci/00_supabase_shim.sql
          for f in ../db/migrations/*.sql; do
            echo "applying $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: RLS gate (script)
        run: python -m app.db.rls_check
      - name: RLS gate (pytest)
        run: pytest -m integration tests/integration/test_rls_gate.py
